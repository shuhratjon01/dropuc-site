<script>
    // Твой ID канала на YouTube
    const CHANNEL_ID = 'UCQjX_k4V4Z2E1Lz5c5lJ_5g'; 

    // Скрипт для переключения тем с сохранением выбора пользователя
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.querySelector('.theme-icon');
    
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'dark') {
        document.body.classList.add('dark-theme');
        themeIcon.textContent = '☀️';
    } else {
        themeIcon.textContent = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        let theme = 'light';
        if (document.body.classList.contains('dark-theme')) {
            theme = 'dark';
            themeIcon.textContent = '☀️';
        } else {
            themeIcon.textContent = '🌙';
        }
        localStorage.setItem('theme', theme);
    });

    // Умная загрузка видео через RSS без использования API-ключей!
    async function fetchVideos() {
        const grid = document.getElementById('video-grid');
        try {
            // Используем RSS-фид Ютуба, перегнанный в JSON
            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
            const apiConverterUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            
            const res = await fetch(apiConverterUrl);
            const data = await res.json();
            
            grid.innerHTML = '';
            
            if (!data.items || data.items.length === 0) {
                grid.innerHTML = '<p class="loading-text">Видео не найдены или канал пуст.</p>';
                return;
            }

            // Берем первые 3 последних видео
            const latestVideos = data.items.slice(0, 3);

            latestVideos.forEach(item => {
                // Извлекаем ID видео из ссылки
                const videoId = item.link.split('v=')[1];
                const videoTitle = item.title;
                const videoImg = item.thumbnail || `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

                const card = `
                    <div class="card">
                        <img src="${videoImg}" alt="Превью видео">
                        <div class="card-info">
                            <h3>${videoTitle}</h3>
                            <a href="https://youtube.com/watch?v=${videoId}" target="_blank">Смотреть</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        } catch(e) { 
            console.error("Ошибка загрузки фида:", e); 
            grid.innerHTML = '<p class="loading-text" style="color: #ff5555;">Не удалось загрузить последние видео. Перейдите прямо на канал!</p>';
        }
    }
    fetchVideos();
</script>
